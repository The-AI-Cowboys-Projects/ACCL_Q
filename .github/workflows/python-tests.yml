name: Python Tests

on:
  push:
    branches: [main, corrina, dev]
    paths:
      - 'driver/python/**'
      - 'test/quantum/**'
      - 'api_server.py'
      - 'pyproject.toml'
      - 'requirements.txt'
  pull_request:
    branches: [main, corrina]
    paths:
      - 'driver/python/**'
      - 'test/quantum/**'
      - 'api_server.py'
      - 'pyproject.toml'
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov ruff

      - name: Run quantum driver tests with coverage
        run: |
          python -m pytest test/quantum/ -v --tb=short --cov=accl_quantum --cov-report=term-missing
        env:
          PYTHONPATH: driver/python

      - name: Run demo script
        run: |
          python demo_accl_q.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff check driver/python/ api_server.py --select E,W,F --ignore E501
